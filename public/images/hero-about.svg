<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="300" cy="230" r="240" fill="url(#bgGlow)"/>
  <circle cx="300" cy="230" r="200" fill="url(#nodeGlow)"/>

  <!-- Outer orbital ring -->
  <circle cx="300" cy="230" r="130" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4 8" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="0 300 230" to="360 300 230" dur="30s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="230" r="160" fill="none" stroke="#34d399" stroke-width="0.5" stroke-dasharray="2 10" opacity="0.15">
    <animateTransform attributeName="transform" type="rotate" from="360 300 230" to="0 300 230" dur="40s" repeatCount="indefinite"/>
  </circle>

  <!-- Glowing core -->
  <circle cx="300" cy="230" r="45" fill="#0f172a" stroke="#10b981" stroke-width="2" opacity="0.9"/>
  <circle cx="300" cy="230" r="35" fill="url(#globeGrad)" stroke="#334155" stroke-width="1"/>
  <circle cx="300" cy="230" r="28" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Globe grid lines -->
  <ellipse cx="300" cy="230" rx="28" ry="28" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="300" cy="230" rx="20" ry="28" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="300" cy="230" rx="10" ry="28" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.1"/>
  <line x1="272" y1="230" x2="328" y2="230" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>
  <line x1="300" y1="202" x2="300" y2="258" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>

  <!-- Globe dots (continents) -->
  <circle cx="290" cy="222" r="2.5" fill="#34d399" opacity="0.6"/>
  <circle cx="310" cy="225" r="2" fill="#10b981" opacity="0.5"/>
  <circle cx="295" cy="238" r="1.5" fill="#34d399" opacity="0.4"/>
  <circle cx="308" cy="218" r="1.5" fill="#10b981" opacity="0.4"/>
  <circle cx="285" cy="232" r="1" fill="#34d399" opacity="0.3"/>

  <!-- Orbiting nodes (people/team members) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 300 230" to="360 300 230" dur="20s" repeatCount="indefinite"/>
    <!-- Node 1 -->
    <g transform="translate(300, 100)">
      <circle cx="0" cy="0" r="16" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <path d="M-5 2 Q0 -6 5 2" stroke="#34d399" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-3" r="3" fill="#34d399" opacity="0.8"/>
      <!-- Connection line to center -->
      <line x1="0" y1="-16" x2="0" y2="-100" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 300 230" to="480 300 230" dur="25s" repeatCount="indefinite"/>
    <!-- Node 2 -->
    <g transform="translate(420, 250)">
      <circle cx="0" cy="0" r="14" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
      <path d="M-4 1 Q0 -5 4 1" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-2" r="2.5" fill="#10b981" opacity="0.8"/>
      <line x1="14" y1="0" x2="114" y2="0" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 300 230" to="600 300 230" dur="22s" repeatCount="indefinite"/>
    <!-- Node 3 -->
    <g transform="translate(180, 330)">
      <circle cx="0" cy="0" r="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <path d="M-3 1 Q0 -4 3 1" stroke="#34d399" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="-2" r="2" fill="#34d399" opacity="0.8"/>
      <line x1="0" y1="12" x2="0" y2="88" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.2"/>
    </g>
  </g>

  <!-- Static nodes (not orbiting) -->
  <g transform="translate(140, 170)">
    <circle cx="0" cy="0" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#34d399" opacity="0.5"/>
    <line x1="10" y1="0" x2="50" y2="60" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>
  </g>

  <g transform="translate(460, 190)">
    <circle cx="0" cy="0" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#34d399" opacity="0.5"/>
    <line x1="-10" y1="0" x2="-48" y2="40" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.15"/>
  </g>

  <!-- Sparkle/star accents -->
  <g transform="translate(120, 100)" opacity="0.4">
    <path d="M0-6 L2-2 L6 0 L2 2 L0 6 L-2 2 L-6 0 L-2-2Z" fill="#34d399">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(490, 120)" opacity="0.3">
    <path d="M0-4 L1.5-1.5 L4 0 L1.5 1.5 L0 4 L-1.5 1.5 L-4 0 L-1.5-1.5Z" fill="#10b981">
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(470, 360)" opacity="0.35">
    <path d="M0-3 L1-1 L3 0 L1 1 L0 3 L-1 1 L-3 0 L-1-1Z" fill="#34d399">
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bottom decorative shapes -->
  <g opacity="0.08">
    <circle cx="80" cy="460" r="30" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="80" cy="460" r="20" fill="none" stroke="#10b981" stroke-width="1"/>
    <circle cx="80" cy="460" r="10" fill="none" stroke="#10b981" stroke-width="0.5"/>

    <circle cx="520" cy="450" r="25" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="520" cy="450" r="16" fill="none" stroke="#34d399" stroke-width="1"/>
    <circle cx="520" cy="450" r="8" fill="none" stroke="#34d399" stroke-width="0.5"/>
  </g>

  <!-- Small connecting paths at bottom -->
  <g opacity="0.12">
    <path d="M160 430 Q230 410 300 420 Q370 430 440 415" stroke="#10b981" stroke-width="0.8" fill="none"/>
    <path d="M180 440 Q250 425 300 432 Q350 439 420 428" stroke="#34d399" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Mission text glow beneath -->
  <text x="300" y="500" text-anchor="middle" fill="#10b981" opacity="0.08" font-family="sans-serif" font-size="10" letter-spacing="6">BUILDING THE FUTURE OF INTERVIEW PREP</text>
</svg>
