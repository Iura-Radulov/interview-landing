<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#bg4)" rx="16"/>

  <g transform="translate(40, 30)">
    <!-- Dashboard header -->
    <text x="0" y="30" font-family="sans-serif" font-weight="700" font-size="18" fill="#e2e8f0">Dashboard</text>

    <!-- Stats -->
    <rect x="0" y="55" width="125" height="65" rx="10" fill="#1e293b"/>
    <text x="15" y="80" font-family="sans-serif" font-size="12" fill="#64748b">Interviews</text>
    <text x="15" y="107" font-family="sans-serif" font-weight="800" font-size="24" fill="#e2e8f0">12</text>

    <rect x="145" y="55" width="125" height="65" rx="10" fill="#1e293b"/>
    <text x="160" y="80" font-family="sans-serif" font-size="12" fill="#64748b">Avg Score</text>
    <text x="160" y="107" font-family="sans-serif" font-weight="800" font-size="24" fill="#10b981">74%</text>

    <rect x="290" y="55" width="125" height="65" rx="10" fill="#1e293b"/>
    <text x="305" y="80" font-family="sans-serif" font-size="12" fill="#64748b">Streak</text>
    <text x="305" y="107" font-family="sans-serif" font-weight="800" font-size="24" fill="#fbbf24">4 days</text>

    <rect x="435" y="55" width="125" height="65" rx="10" fill="#1e293b"/>
    <text x="450" y="80" font-family="sans-serif" font-size="12" fill="#64748b">Plan</text>
    <text x="450" y="107" font-family="sans-serif" font-weight="800" font-size="24" fill="#a78bfa">Pro</text>

    <!-- Recent sessions -->
    <text x="0" y="155" font-family="sans-serif" font-weight="600" font-size="14" fill="#94a3b8">Recent Sessions</text>

    <!-- Row 1 -->
    <rect x="0" y="170" width="560" height="40" rx="8" fill="#1e293b"/>
    <text x="15" y="195" font-family="sans-serif" font-size="13" fill="#e2e8f0">Senior Frontend</text>
    <text x="180" y="195" font-family="sans-serif" font-size="12" fill="#64748b">Technical</text>
    <text x="290" y="195" font-family="sans-serif" font-size="12" fill="#64748b">Jun 7</text>
    <text x="480" y="195" text-anchor="end" font-family="sans-serif" font-weight="600" font-size="13" fill="#10b981">82/100</text>

    <!-- Row 2 -->
    <rect x="0" y="215" width="560" height="40" rx="8" fill="#1e293b"/>
    <text x="15" y="240" font-family="sans-serif" font-size="13" fill="#e2e8f0">Mid Backend</text>
    <text x="180" y="240" font-family="sans-serif" font-size="12" fill="#64748b">Technical</text>
    <text x="290" y="240" font-family="sans-serif" font-size="12" fill="#64748b">Jun 6</text>
    <text x="480" y="240" text-anchor="end" font-family="sans-serif" font-weight="600" font-size="13" fill="#fbbf24">71/100</text>

    <!-- Row 3 -->
    <rect x="0" y="260" width="560" height="40" rx="8" fill="#1e293b"/>
    <text x="15" y="285" font-family="sans-serif" font-size="13" fill="#e2e8f0">System Design</text>
    <text x="180" y="285" font-family="sans-serif" font-size="12" fill="#64748b">Behavioral</text>
    <text x="290" y="285" font-family="sans-serif" font-size="12" fill="#64748b">Jun 5</text>
    <text x="480" y="285" text-anchor="end" font-family="sans-serif" font-weight="600" font-size="13" fill="#f87171">58/100</text>

    <!-- Progress chart area -->
    <text x="0" y="340" font-family="sans-serif" font-weight="600" font-size="14" fill="#94a3b8">Progress Over Time</text>
    <rect x="0" y="355" width="560" height="90" rx="12" fill="#1e293b"/>

    <!-- Simple bar chart -->
    <g transform="translate(20, 375)">
      <rect x="0" y="30" width="30" height="35" rx="3" fill="#334155"/>
      <rect x="50" y="20" width="30" height="45" rx="3" fill="#334155"/>
      <rect x="100" y="15" width="30" height="50" rx="3" fill="#334155"/>
      <rect x="150" y="25" width="30" height="40" rx="3" fill="#10b981"/>
      <rect x="200" y="10" width="30" height="55" rx="3" fill="#10b981"/>
      <rect x="250" y="5" width="30" height="60" rx="3" fill="#10b981"/>
      <text x="15" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">1 Jun</text>
      <text x="65" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">2 Jun</text>
      <text x="115" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">3 Jun</text>
      <text x="165" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">4 Jun</text>
      <text x="215" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">5 Jun</text>
      <text x="265" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">6 Jun</text>
    </g>
  </g>
</svg>
