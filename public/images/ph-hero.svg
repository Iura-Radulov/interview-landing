<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0c0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="350" fill="url(#glow1)"/>
  <circle cx="1050" cy="500" r="300" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.02" stroke="white" stroke-width="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="628"/>
    <line x1="600" y1="0" x2="600" y2="628"/>
    <line x1="900" y1="0" x2="900" y2="628"/>
  </g>

  <!-- Left side: Mock interview UI mockup -->
  <g transform="translate(80, 80)" filter="url(#shadow)">
    <!-- Chat window -->
    <rect x="0" y="0" width="460" height="470" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="460" height="56" rx="16" fill="#0f172a"/>
    <rect x="0" y="40" width="460" height="16" fill="#0f172a"/>
    <circle cx="24" cy="28" r="10" fill="#10b981"/>
    <text x="44" y="33" font-family="sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">AI Interviewer</text>
    <circle cx="430" cy="28" r="4" fill="#ef4444"/>
    <circle cx="442" cy="28" r="4" fill="#fbbf24"/>
    <circle cx="454" cy="28" r="4" fill="#22c55e"/>

    <!-- Chat messages -->
    <!-- AI question -->
    <rect x="16" y="72" width="340" height="48" rx="12" fill="#334155"/>
    <text x="28" y="93" font-family="sans-serif" font-size="14" fill="#e2e8f0">Explain the difference between</text>
    <text x="28" y="112" font-family="sans-serif" font-size="14" fill="#e2e8f0">useEffect and useLayoutEffect in React.</text>

    <!-- User answer bubble -->
    <rect x="100" y="136" width="344" height="72" rx="12" fill="#10b981" opacity="0.15"/>
    <rect x="100" y="136" width="344" height="72" rx="12" fill="#10b981" opacity="0.08"/>
    <text x="112" y="157" font-family="sans-serif" font-size="13" fill="#a7f3d0">useEffect runs after the browser paints...</text>
    <text x="112" y="176" font-family="sans-serif" font-size="13" fill="#a7f3d0">useLayoutEffect runs synchronously</text>
    <text x="112" y="195" font-family="sans-serif" font-size="13" fill="#a7f3d0">before paint — use for DOM measurements.</text>

    <!-- Feedback card -->
    <rect x="16" y="224" width="428" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="28" y="248" font-family="sans-serif" font-weight="600" font-size="13" fill="#fbbf24">✦ Score: 7.5 / 10</text>

    <!-- Score bar -->
    <rect x="28" y="258" width="372" height="6" rx="3" fill="#334155"/>
    <rect x="28" y="258" width="279" height="6" rx="3" fill="#fbbf24"/>

    <text x="28" y="284" font-family="sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">Strengths</text>
    <text x="28" y="300" font-family="sans-serif" font-size="12" fill="#94a3b8">✓ Correct conceptual understanding</text>
    <text x="28" y="316" font-family="sans-serif" font-size="12" fill="#94a3b8">✓ Mentioned the paint timing correctly</text>

    <text x="240" y="284" font-family="sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">Improve</text>
    <text x="240" y="300" font-family="sans-serif" font-size="12" fill="#94a3b8">✗ Add concrete use case examples</text>
    <text x="240" y="316" font-family="sans-serif" font-size="12" fill="#94a3b8">✗ Mention cleanup functions</text>

    <!-- Input bar -->
    <rect x="16" y="380" width="340" height="40" rx="20" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="32" y="405" font-family="sans-serif" font-size="13" fill="#475569">Type your answer...</text>
    <circle cx="400" cy="400" r="16" fill="#10b981"/>
    <path d="M395 395l10 5-10 5z" fill="white"/>
  </g>

  <!-- Right side: Title and features -->
  <g transform="translate(600, 100)">
    <rect x="0" y="-10" width="80" height="28" rx="14" fill="#10b981" opacity="0.15"/>
    <text x="14" y="8" font-family="sans-serif" font-weight="600" font-size="12" fill="#34d399">NEW</text>

    <text x="0" y="55" font-family="sans-serif" font-weight="800" font-size="44" fill="white" letter-spacing="-1">AI Interview</text>
    <text x="0" y="105" font-family="sans-serif" font-weight="800" font-size="44" fill="url(#accent)" letter-spacing="-1">Trainer</text>

    <text x="0" y="140" font-family="sans-serif" font-weight="400" font-size="17" fill="#94a3b8">AI-powered mock interviews that help</text>
    <text x="0" y="165" font-family="sans-serif" font-weight="400" font-size="17" fill="#94a3b8">developers ace technical interviews.</text>

    <!-- Features -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="440" height="220" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.6"/>

      <g transform="translate(20, 20)">
        <circle cx="10" cy="10" r="5" fill="#10b981"/>
        <text x="24" y="15" font-family="sans-serif" font-weight="600" font-size="14" fill="#e2e8f0">Technical &amp; Behavioral (STAR) Interviews</text>
        <text x="24" y="32" font-family="sans-serif" font-size="12" fill="#64748b">Frontend, Backend, Fullstack, System Design</text>
      </g>

      <g transform="translate(20, 80)">
        <circle cx="10" cy="10" r="5" fill="#10b981"/>
        <text x="24" y="15" font-family="sans-serif" font-weight="600" font-size="14" fill="#e2e8f0">Real-time AI Scoring &amp; Feedback</text>
        <text x="24" y="32" font-family="sans-serif" font-size="12" fill="#64748b">Instant evaluation with detailed improvement tips</text>
      </g>

      <g transform="translate(20, 140)">
        <circle cx="10" cy="10" r="5" fill="#10b981"/>
        <text x="24" y="15" font-family="sans-serif" font-weight="600" font-size="14" fill="#e2e8f0">Voice Answers + Resume Upload</text>
        <text x="24" y="32" font-family="sans-serif" font-size="12" fill="#64748b">Practice speaking. Upload PDF for personalized questions</text>
      </g>
    </g>

    <!-- Free tag -->
    <rect x="0" y="460" width="180" height="40" rx="20" fill="#10b981"/>
    <text x="90" y="485" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="15" fill="white">Free to Start →</text>

    <text x="0" y="520" font-family="sans-serif" font-size="13" fill="#475569">No credit card required · 3 experience levels · EN/RU</text>
  </g>

  <!-- Bottom: maker info -->
  <text x="1200" y="600" text-anchor="end" font-family="sans-serif" font-weight="500" font-size="11" fill="#334155" letter-spacing="1.5">PREPCRAFT LTD · MAKED WITH ❤️ IN LONDON &amp; CHISINAU</text>
</svg>
