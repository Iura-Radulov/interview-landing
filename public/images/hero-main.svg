<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="emeraldFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="300" cy="250" r="220" fill="url(#glow)"/>
  <circle cx="420" cy="180" r="160" fill="url(#glow2)"/>
  <circle cx="180" cy="350" r="120" fill="url(#glow2)"/>

  <!-- Neural network connection lines -->
  <g opacity="0.3">
    <line x1="160" y1="120" x2="260" y2="180" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="260" y1="180" x2="340" y2="140" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="340" y1="140" x2="440" y2="170" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="440" y1="170" x2="380" y2="280" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="380" y1="280" x2="300" y2="320" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="300" y1="320" x2="200" y2="350" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="200" y1="350" x2="160" y2="120" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="260" y1="180" x2="380" y2="280" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="340" y1="140" x2="200" y2="350" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="160" y1="120" x2="380" y2="280" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 6"/>
  </g>

  <!-- Neural network nodes (outer ring) -->
  <circle cx="160" cy="120" r="6" fill="#10b981" opacity="0.8" filter="url(#nodeGlow)"/>
  <circle cx="160" cy="120" r="3" fill="#34d399"/>
  <circle cx="440" cy="170" r="5" fill="#10b981" opacity="0.6" filter="url(#nodeGlow)"/>
  <circle cx="440" cy="170" r="2.5" fill="#34d399"/>
  <circle cx="200" cy="350" r="5" fill="#10b981" opacity="0.6" filter="url(#nodeGlow)"/>
  <circle cx="200" cy="350" r="2.5" fill="#34d399"/>

  <!-- Floating code brackets -->
  <text x="70" y="100" fill="#10b981" opacity="0.3" font-family="monospace" font-size="28" font-weight="bold">{ }</text>
  <text x="480" y="400" fill="#34d399" opacity="0.2" font-family="monospace" font-size="22" font-weight="bold">&lt;/&gt;</text>

  <!-- Main chat UI card -->
  <g transform="translate(150, 140)">
    <!-- Card shadow -->
    <rect x="2" y="2" width="300" height="220" rx="16" fill="#10b981" opacity="0.08" filter="url(#softGlow)"/>
    <!-- Card background -->
    <rect x="0" y="0" width="300" height="220" rx="16" fill="url(#cardBg)" stroke="#334155" stroke-width="1.5"/>
    <!-- Card header -->
    <rect x="0" y="0" width="300" height="48" rx="16" fill="#1e293b"/>
    <rect x="0" y="30" width="300" height="18" fill="#1e293b"/>
    <!-- Header dots -->
    <circle cx="20" cy="24" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="36" cy="24" r="4" fill="#eab308" opacity="0.8"/>
    <circle cx="52" cy="24" r="4" fill="#22c55e" opacity="0.8"/>
    <!-- Header text -->
    <text x="280" y="28" text-anchor="end" fill="#94a3b8" font-family="monospace" font-size="11">AI Interview</text>

    <!-- Chat message 1 (AI) -->
    <rect x="12" y="58" width="180" height="36" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="20" y="80" fill="#e2e8f0" font-family="sans-serif" font-size="12">Tell me about yourself</text>

    <!-- Chat message 2 (User) -->
    <rect x="130" y="102" width="158" height="28" rx="8" fill="#10b981" opacity="0.15"/>
    <text x="138" y="120" fill="#10b981" font-family="sans-serif" font-size="11">I'm a software engineer...</text>

    <!-- Chat message 3 (AI) -->
    <rect x="12" y="138" width="195" height="36" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="20" y="160" fill="#e2e8f0" font-family="sans-serif" font-size="12">Great! Let&apos;s practice</text>
    <text x="20" y="175" fill="#e2e8f0" font-family="sans-serif" font-size="10">system design...</text>

    <!-- Typing indicator -->
    <rect x="12" y="182" width="52" height="24" rx="8" fill="#1e293b" opacity="0.7"/>
    <circle cx="24" cy="194" r="3" fill="#94a3b8"><animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="34" cy="194" r="3" fill="#94a3b8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="44" cy="194" r="3" fill="#94a3b8"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Floating UI elements around the card -->
  <!-- Star/Rating -->
  <g transform="translate(470, 130)" opacity="0.7">
    <circle cx="0" cy="0" r="18" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#34d399" font-size="16">★</text>
  </g>

  <!-- Small chart/analytics -->
  <g transform="translate(80, 380)" opacity="0.5">
    <rect x="0" y="18" width="24" height="14" rx="3" fill="#1e293b" stroke="#10b981" stroke-width="0.5"/>
    <rect x="3" y="24" width="4" height="6" rx="1" fill="#10b981"/>
    <rect x="9" y="20" width="4" height="10" rx="1" fill="#34d399"/>
    <rect x="15" y="22" width="4" height="8" rx="1" fill="#10b981"/>
  </g>

  <!-- Small gear/settings -->
  <g transform="translate(500, 360)" opacity="0.35">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="0" cy="0" r="3" fill="#10b981"/>
  </g>

  <!-- Decorative lines -->
  <g opacity="0.15">
    <line x1="50" y1="280" x2="120" y2="280" stroke="#34d399" stroke-width="1"/>
    <line x1="50" y1="285" x2="100" y2="285" stroke="#34d399" stroke-width="0.5"/>
    <line x1="480" y1="280" x2="550" y2="280" stroke="#10b981" stroke-width="1"/>
    <line x1="500" y1="285" x2="550" y2="285" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Small particles -->
  <circle cx="100" cy="180" r="2" fill="#10b981" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="220" r="1.5" fill="#34d399" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="300" r="1.5" fill="#10b981" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="490" cy="310" r="2" fill="#34d399" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom accent wave -->
  <path d="M0 500 Q150 480 300 490 Q450 500 600 485 L600 500 L0 500Z" fill="#10b981" opacity="0.04"/>
</svg>
