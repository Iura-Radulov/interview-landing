<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#bg1)" rx="16"/>
  <!-- Step indicators -->
  <g transform="translate(40, 40)">
    <text font-family="sans-serif" font-weight="700" font-size="36" fill="white">1</text>
    <text x="0" y="50" font-family="sans-serif" font-weight="600" font-size="14" fill="#10b981">CHOOSE YOUR ROLE</text>
    <text x="0" y="75" font-family="sans-serif" font-size="20" fill="#e2e8f0">Pick your role &amp; experience level</text>
    <text x="0" y="100" font-family="sans-serif" font-size="14" fill="#64748b">Frontend · Backend · Fullstack · System Design · DevOps · QA · Security</text>

    <!-- Role cards -->
    <rect x="0" y="120" width="170" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="150" font-family="sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">Senior Frontend</text>
    <text x="20" y="168" font-family="sans-serif" font-size="12" fill="#64748b">React · Next.js · TypeScript</text>

    <rect x="190" y="120" width="170" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="210" y="150" font-family="sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">Mid Backend</text>
    <text x="210" y="168" font-family="sans-serif" font-size="12" fill="#64748b">Node.js · Python · Go</text>

    <rect x="380" y="120" width="170" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="400" y="150" font-family="sans-serif" font-weight="600" font-size="15" fill="#e2e8f0">System Design</text>
    <text x="400" y="168" font-family="sans-serif" font-size="12" fill="#64748b">Scalability · Microservices</text>

    <!-- Level selector -->
    <text x="0" y="220" font-family="sans-serif" font-weight="600" font-size="13" fill="#94a3b8">Experience Level</text>
    <rect x="0" y="230" width="90" height="32" rx="16" fill="#10b981"/>
    <text x="45" y="250" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="white">Junior</text>
    <rect x="100" y="230" width="90" height="32" rx="16" fill="#10b981"/>
    <text x="145" y="250" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="white">Mid</text>
    <rect x="200" y="230" width="90" height="32" rx="16" fill="#10b981"/>
    <text x="245" y="250" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="white">Senior</text>

    <!-- Mode selector -->
    <text x="0" y="300" font-family="sans-serif" font-weight="600" font-size="13" fill="#94a3b8">Interview Mode</text>
    <rect x="0" y="310" width="130" height="36" rx="18" fill="#334155"/>
    <text x="65" y="333" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">Technical</text>
    <rect x="140" y="310" width="130" height="36" rx="18" fill="#10b981"/>
    <text x="205" y="333" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="white">Behavioral</text>
    <rect x="280" y="310" width="150" height="36" rx="18" fill="#334155"/>
    <text x="355" y="333" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">System Design</text>

    <!-- Start button -->
    <rect x="0" y="370" width="560" height="50" rx="25" fill="url(#accent)"/>
    <text x="280" y="401" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="17" fill="white">🎤 Start Interview</text>
  </g>
</svg>
